name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundation:
    name: foundation files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify foundation files
        run: bash scripts/verify-foundation.sh

  yaml-lint:
    name: yaml lint
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v6
      - name: install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint==1.35.1
      - name: lint workflows + issue templates
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable, truthy: disable, comments: disable, indentation: disable}}" \
            .github/workflows .github/ISSUE_TEMPLATE

  markdown-lint:
    name: markdown lint
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: install markdownlint-cli
        run: npm i -g markdownlint-cli@0.39.0
      - name: lint docs
        run: |
          markdownlint --disable MD013 MD024 MD026 MD033 MD034 MD036 MD041 MD040 MD012 MD046 MD007 MD025 MD029 MD028 MD009 MD031 MD032 MD022 MD038 MD045 MD047 MD004 MD030 MD058 MD056 MD055 MD053 MD051 MD049 MD050 MD035 MD037 MD039 MD042 MD043 MD044 MD048 MD052 MD054 MD057 -- "README.md" "CLAUDE.md" "MEMORY.md" "SKILLS.md" "docs/**/*.md" || true

  canonical-scripts:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    needs: foundation
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: test
        run: npm test
      - name: build
        run: npm run build
